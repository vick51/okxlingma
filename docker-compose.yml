version: '3.8'

services:
  okx-trading:
    build: .
    container_name: okx-trading-system
    ports:
      - "5000:5000"
    volumes:
      # 挂载数据目录（数据库持久化）
      - ./data:/app/data
      # 挂载环境配置文件
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
