services:
  okx-trading:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: okx-trading-system
    ports:
      - "${WEB_PORT:-5000}:${WEB_PORT:-5000}"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Asia/Shanghai
      - FLASK_PORT=${WEB_PORT:-5000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT:-5000}/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
